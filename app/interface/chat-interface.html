<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Chat Interface</title>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.19.0/dist/cytoscape.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; }
        #chat-container { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #ccc; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; }
        #user-input { padding: 10px; border-top: 1px solid #ccc; }
        #user-input input { width: 80%; padding: 5px; }
        #user-input button { padding: 5px 10px; }
        #visualization-container { flex: 1; display: flex; flex-direction: column; }
        #cy { flex: 1; }
        #controls { padding: 10px; border-top: 1px solid #ccc; }
        .message { margin-bottom: 10px; }
        .agent { font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="chat-messages"></div>
        <div id="user-input">
            <input type="text" id="user-message" placeholder="Type your message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <div id="visualization-container">
        <div id="cy"></div>
        <div id="controls">
            <button onclick="initializeConversation()">Initialize</button>
            <button onclick="nextTurn()">Next Turn</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://your-backend-url.com/api';
        let conversationId = null;
        let cy = null;

        // Wait for the DOM and Cytoscape to load before initializing
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof cytoscape !== 'undefined') {
                initializeCytoscape();
            } else {
                console.error('Cytoscape library not loaded');
            }
        });

        function initializeCytoscape() {
            cy = cytoscape({
                container: document.getElementById('cy')
            });
        }

        async function initializeConversation() {
            try {
                const response = await fetch(`${API_BASE_URL}/initialize`, { method: 'POST' });
                const data = await response.json();
                conversationId = data.conversationId;
                document.getElementById('chat-messages').innerHTML = '';
                displayMessage('System', 'Conversation initialized.');
            } catch (error) {
                console.error('Error initializing conversation:', error);
            }
        }

        async function nextTurn() {
            if (!conversationId) {
                displayMessage('System', 'Please initialize the conversation first.');
                return;
            }
            try {
                const response = await fetch(`${API_BASE_URL}/next/${conversationId}`, { method: 'POST' });
                const data = await response.json();
                handleAgentResponse(data);
            } catch (error) {
                console.error('Error getting next turn:', error);
            }
        }

        async function sendMessage() {
            const userMessage = document.getElementById('user-message').value;
            if (!userMessage) return;

            displayMessage('User', userMessage);
            document.getElementById('user-message').value = '';

            if (!conversationId) {
                displayMessage('System', 'Please initialize the conversation first.');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/input/${conversationId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userMessage })
                });
                const data = await response.json();
                handleAgentResponse(data);
            } catch (error) {
                console.error('Error sending message:', error);
            }
        }

        function handleAgentResponse(data) {
            displayMessage(data.agent, data.message);
            if (data.network) {
                displayNetwork(data.network);
            }
            if (data.image) {
                displayImage(data.image);
            }
        }

        function displayMessage(sender, message) {
            const chatMessages = document.getElementById('chat-messages');
            const messageElement = document.createElement('div');
            messageElement.className = 'message';
            messageElement.innerHTML = `<span class="agent">${sender}:</span> ${message}`;
            chatMessages.appendChild(messageElement);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function displayNetwork(networkData) {
            if (cy) {
                cy.json({ elements: networkData });
                cy.layout({ name: 'cose' }).run();
            } else {
                console.error('Cytoscape is not initialized');
            }
        }

        function displayImage(imageData) {
            const chatMessages = document.getElementById('chat-messages');
            const imageElement = document.createElement('img');
            imageElement.src = `data:image/png;base64,${imageData}`;
            imageElement.style.maxWidth = '100%';
            chatMessages.appendChild(imageElement);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
