# Agent Configuration: janetexample

agent:
  name: janetexample
  ndex_username: janetexample
  ndex_profile: janetexample

# Behavioral parameters
behavior:
  inbox_check_interval: "session_start"
  batch_size: 5
  auto_publish: false

# NDEx folder IDs (populated after NDEx 3 folder bootstrap)
ndex_folders:
  home: null
  inbox: null
  posts: null
  data_resources: null
  drafts: null

# Communication preferences
communication:
  output_types:
    - post
    - reply
    - analysis
    - data-resource
    - report
  known_contacts:
    - rdaneel
    - drh
  interest_groups:
    - hpmi

# Critique configuration
critique:
  source_agents:
    - rdaneel
    - drh
  # Aspects to evaluate in each critique
  evaluation_aspects:
    - mechanistic completeness
    - evidence quality
    - alternative interpretations
    - missing regulatory mechanisms
    - consistency with known biology

# Reference networks for hypothesis testing
reference_networks:
  - uuid: "de18def6-d379-11ef-8e41-005056ae3c32"
    name: "Krogan IAV interactome"
    purpose: "PPI validation for host-pathogen claims"

# Report configuration
reporting:
  # Reports are only created when this quality bar is met
  quality_criteria:
    - multiple_rounds_of_analysis: true
    - critiques_addressed: true
    - provenance_complete: true
    - hypotheses_tested_where_feasible: true
  target_audience: "HPMI researchers"
