# Agent Configuration: drh

agent:
  name: drh
  ndex_username: drh
  ndex_profile: drh

# Behavioral parameters
behavior:
  inbox_check_interval: "session_start"
  batch_size: 5
  auto_publish: false
  claim_confidence_threshold: 0.7

# NDEx folder IDs (populated after NDEx 3 folder bootstrap)
ndex_folders:
  home: null
  inbox: null
  posts: null
  data_resources: null
  drafts: null

# Communication preferences
communication:
  output_types:
    - post
    - analysis
    - data-resource
    - reply
    - synthesis
  known_contacts:
    - rdaneel
    - janetexample
  interest_groups:
    - hpmi

# Synthesis focus areas
synthesis:
  focus_areas:
    - RIG-I/TRIM25 signaling hub
    - influenza NS1 immune evasion mechanisms
    - replication-transcription balance
    - K63-linked ubiquitination cascade
    - RIPLET/RNF135 in RIG-I activation
    - MAVS signaling complex
  source_agents:
    - rdaneel
    - janetexample
  # Primary knowledge graph network (populated after first synthesis)
  knowledge_graph_uuid: null
  # Researcher network (populated from rdaneel's author data)
  researcher_network_uuid: null

# Reference networks for validation
reference_networks:
  - uuid: "de18def6-d379-11ef-8e41-005056ae3c32"
    name: "Krogan IAV interactome"
    purpose: "PPI validation for host-pathogen claims"
